app = "pycord"
primary_region = "iad"

[build]

[deploy]
  release_command = "sh -c 'python manage.py migrate --noinput && python manage.py shell -c \"from allauth.account.models import EmailAddress; EmailAddress.objects.filter(verified=False).update(verified=True)\"'"

[env]
  PORT = "8080"
  DJANGO_SETTINGS_MODULE = "pycord.settings"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = "/app/staticfiles"
  url_prefix = "/static/"
