{% extends 'app_shell.html' %}
{% block title %}{{ server.name }} · PyCord{% endblock %}
{% block app_main %}
<div class="flex-1 grid place-items-center text-center px-6">
  <div class="max-w-md space-y-3">
    <h2 class="text-2xl font-bold">No channels yet</h2>
    <p class="text-discord-muted">
      This server doesn't have any channels. Create one from the admin or run
      <code class="bg-discord-input px-1 rounded">python manage.py createsuperuser</code>.
    </p>
  </div>
</div>
{% endblock %}
